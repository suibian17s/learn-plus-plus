<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#660874"/>
      <stop offset="100%" stop-color="#4A0656"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- Stylized T -->
  <g fill="#fff">
    <!-- Horizontal bar with subtle serif -->
    <rect x="52" y="64" width="152" height="28" rx="8"/>
    <!-- Vertical stem -->
    <rect x="110" y="64" width="36" height="128" rx="8"/>
    <!-- Bottom serif -->
    <rect x="80" y="172" width="96" height="28" rx="8"/>
  </g>
  <!-- Decorative water ripple (referencing 清) -->
  <circle cx="200" cy="196" r="18" fill="none" stroke="#fff" stroke-width="3" opacity="0.35"/>
  <circle cx="200" cy="196" r="8" fill="#fff" opacity="0.25"/>
</svg>
